services:
  # Web service to run Express API and serve React SPA assets
  - type: web
    name: sbl-leads-microsite
    env: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: COOKIE_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false # Set manually in Render Dashboard
      - key: APIFY_API_TOKEN
        sync: false # Set manually in Render Dashboard
      - key: ALLOWED_ORIGINS
        sync: false # Set manually in Render Dashboard (e.g. https://sbl.so)
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sbl-redis-cache
          property: connectionString
      - key: TRUST_PROXY_HOPS
        value: "1" # Trust 1 hop (Render's load balancer) for reading real client IPs

  # Valkey (Redis-compatible) keyvalue cache store
  - type: keyvalue
    name: sbl-redis-cache
    plan: free
    ipAllowList: [] # Access restricted only to internal Render services for high security
